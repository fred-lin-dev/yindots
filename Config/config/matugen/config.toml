# Matugen — génération de couleurs depuis le fond d'écran
# Commande : matugen image /path/to/wallpaper.jpg
# Les fichiers de sortie sont dans ~/afs/.confs/Config/config/[app]/
# (qui sont aussi ~/.config/[app]/ via symlinks créés par install.sh)

[config]
reload_apps = true
run_after = [["touch", "~/.config/alacritty/alacritty.toml"],]

[config.reload_apps_list]
gtk_theme = true

# ── i3 ───────────────────────────────────────────────────────────────────────
[templates.i3]
input_path  = '~/afs/.confs/Config/config/matugen/templates/i3.conf'
output_path = '~/afs/.confs/Config/config/i3/colors.conf'
post_hook   = 'i3 reload > /dev/null'

# ── Polybar ───────────────────────────────────────────────────────────────────
[templates.polybar]
input_path  = '~/afs/.confs/Config/config/matugen/templates/polybar.ini'
output_path = '~/afs/.confs/Config/config/polybar/colors.ini'
post_hook   = 'polybar-msg cmd restart > /dev/null'

# ── Rofi ─────────────────────────────────────────────────────────────────────
[templates.rofi]
input_path  = '~/afs/.confs/Config/config/matugen/templates/rofi.rasi'
output_path = '~/afs/.confs/Config/config/rofi/colors.rasi'

# ── Alacritty ─────────────────────────────────────────────────────────────────
[templates.alacritty]
input_path  = '~/afs/.confs/Config/config/matugen/templates/alacritty.toml'
output_path = '~/afs/.confs/Config/config/alacritty/colors.toml'

# ── Dunst ─────────────────────────────────────────────────────────────────────
[templates.dunst]
input_path  = '~/afs/.confs/Config/config/matugen/templates/dunstrc'
output_path = '~/afs/.confs/Config/config/dunst/dunstrc'
post_hook   = 'dunstctl reload'

# ── Flameshot ─────────────────────────────────────────────────────────────────
[templates.flameshot]
input_path  = '~/afs/.confs/Config/config/matugen/templates/flameshot.ini'
output_path = '~/afs/.confs/Config/config/flameshot/flameshot.ini'

# ── GTK 3 ─────────────────────────────────────────────────────────────────────
[templates.gtk3]
input_path  = '~/afs/.confs/Config/config/matugen/templates/gtk.css'
output_path = '~/afs/.confs/Config/config/gtk-3.0/colors.css'

# ── GTK 4 ─────────────────────────────────────────────────────────────────────
[templates.gtk4]
input_path  = '~/afs/.confs/Config/config/matugen/templates/gtk.css'
output_path = '~/afs/.confs/Config/config/gtk-4.0/colors.css'

# ── Qt 5 ─────────────────────────────────────────────────────────────────────
[templates.qt5ct]
input_path  = '~/afs/.confs/Config/config/matugen/templates/qtct.conf'
output_path = '~/afs/.confs/Config/config/qt5ct/colors/matugen.conf'

# ── Qt 6 ─────────────────────────────────────────────────────────────────────
[templates.qt6ct]
input_path  = '~/afs/.confs/Config/config/matugen/templates/qtct.conf'
output_path = '~/afs/.confs/Config/config/qt6ct/colors/matugen.conf'

# ── Pywalfox (Firefox theming) ────────────────────────────────────────────────
[templates.pywalfox]
input_path  = '~/afs/.confs/Config/config/matugen/templates/pywalfox.json'
output_path = '~/afs/.confs/Config/config/matugen/pywalfox.json'
post_hook   = 'pywalfox update'
